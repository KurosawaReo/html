<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Kurosawa Reo</title>
  <!-- cssファイル -->
  <link rel="stylesheet" href="../../plugins/slick/slick.css">
  <link rel="stylesheet" href="../../plugins/slick/slick-theme.css">
  <link rel="stylesheet" href="../../plugins/lightbox2/css/lightbox.min.css">
  <link rel="stylesheet" href="../../plugins/KrLib_html/kr_common.css">
  <link rel="stylesheet" href="../../css/common.css">
  <link rel="stylesheet" href="../../css/details_page.css">
  <!-- jsファイル -->
  <script src="../../plugins/jquery/jquery-3.7.0.min.js"></script>
  <script src="../../plugins/slick/slick.min.js"></script>
  <script src="../../plugins/lightbox2/js/lightbox.min.js"></script>
</head>
<body>

  <!-- イントロアニメーション -->
  <div id="intro">
    <h1 class="intro-text">
      Gun Action
    </h1>
  </div>

  <!-- 背景 -->
  <div class="bg-wrap">
    <div class="light-beams"></div>
    <canvas id="fx"></canvas>
  </div>

  <!-- ヘッダー -->
  <header>
    <nav class="nav">
      <div class="brand">PORTFOLIO</div>
      <div class="spacer"></div> <!-- スペース -->
      <a href="../../">メインページ</a>
    </nav>
  </header>

  <!-- スライド式サイド目次 -->
  <aside class="side-toc">
    <div class="side-toc-inner">

      <h2 class="title">目次</h2>

      <div class="contents">
        <p>
          <span class="side-toc-dot">・</span><a href="#contents-overview">作品概要</a>
        </p>
        <p>
          <span class="side-toc-dot">・</span><a href="#contents-proposal">企画</a>
        </p>
        <p>
          <span class="side-toc-dot">・</span><a href="#contents-production">制作風景</a>
        </p>
      </div>
    </div>
  </aside>
  <!-- サイド目次 | スマホ用タップ判定 -->
  <div class="side-toc-touch-area" aria-hidden="true"></div>

  <!-- サイト本体 -->
  <main class="wrap">

    <section id="contents-overview">
      <h2 class="h2 neon">作品概要</h2>
      <!-- 画像 -->
      <div class="panel">
        <!-- スライダー -->
        <section id="img-slider">
          <img src="../../img/works/gun_action/card_image.webp" class="kr-layout_center-img">
          <img src="../../img/works/gun_action/exhibition.webp" class="kr-layout_center-img">
        </section>
      </div>
      <!-- 表 -->
      <div class="panel">
        <table class="info-table">
          <tr>
            <td>ジャンル</td>
            <td>
              <span class="pillbar">
                <span class="pill">アクション</span>
                <span class="pill">TPS</span>
              </span>
            </td>
          </tr>
          <tr>
            <td>操作端末</td>
            <td>
              <span class="pillbar">
                <span class="pill">キーボード & マウス</span>
              </span>
            </td>
          </tr>
        </table>
      </div>
      <div class="panel">
        <table class="info-table">
          <tr>
            <td>開発期間</td>
            <td>2025/10 ~ 現在</td>
          </tr>
          <tr>
            <td>開発人数</td>
            <td>
              2人
              <span class="person-icons">
                <span class="person-icon"></span>
                <span class="person-icon"></span>
              </span>
            </td>
          </tr>
          <tr>
            <td>使用技術</td>
            <td>
              <span class="pillbar">
                <span class="pill">Unreal Engine</span>
                <span class="pill">C++</span>
              </span>
            </td>
          </tr>
          <tr>
            <td>担当</td>
            <td>
              <span class="pillbar">
                <span class="pill">弾丸の基底クラス</span>
                <span class="pill">プレイヤー & 敵の基底クラス</span>
                <span class="pill">エンジンのトラブル対応</span>
              </span>
            </td>
          </tr>
        </table>
      </div>
      <!-- リンク -->
      <div class="panel">
        <b class="title">リンク</b>
        <p>
          <a href="https://github.com/KurosawaReo/2GM_shinkyu_kouki02" target="_blank" class="btn-link">
            GitHub>>
          </a>
        </p>
      </div>
    </section>

    <div class="neon-line"></div> <!-- グラデーション線 -->

    <section id="contents-proposal">
      <div class="fade-in">
        <h2 class="h2 neon">企画</h2>
        
        <div class="panel">
          <b class="title">一枚企画書</b>
          <a href="../../img/works/gun_action/proposal.webp" data-lightbox="reflect_line" class="zoom-icon-parent">
            <img src="../../img/works/gun_action/proposal.webp" class="panel-img">
            <img src="../../img/works/zoom-icon.webp" class="zoom-icon">
          </a>
        </div>

        <div class="panel">
          <b class="title">プレゼン資料</b>
          <div class="ppt-frame">
            <embed src="../../pdf/works/gun_action.pdf" type="application/pdf" class="panel-img">
          </div>
        </div>
      </div>
    </section>
    
    <div class="neon-line"></div> <!-- グラデーション線 -->

    <section id="contents-production">
      <div class="fade-in">
        <h2 class="h2 neon">制作風景</h2>

        <div class="panel">
          <iframe
            src="https://www.youtube.com/embed/fJSFL73J6wg"
            width="100%"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen
            class="kr-layout_center-iframe panel-img"
          ></iframe>
        </div>
      </div>
    </section>

    <p>
      <a href="../../" class="back-button">メインページ</a>
    </p>
  </main>

  <!-- フッター -->
  <footer>
    <small>
      最終更新日: 2026/04/14<br>
      随時更新中<br>
      <br>
      ©2025-2026 Kurosawa Reo Portfolio
    </small>
  </footer>

  <!-- jsファイル -->
  <script src="../../js/common.js"></script>
  <script src="../../js/details_page.js"></script>

  <!-- マウスカーソル -->
  <div class="cursor"></div>
</body>
</html>
