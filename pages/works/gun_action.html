<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- cssファイル -->
  <link rel="stylesheet" href="../../plugins/slick/slick.css">
  <link rel="stylesheet" href="../../plugins/slick/slick-theme.css">
  <link rel="stylesheet" href="../../plugins/KrLib_html/kr_common.css">
  <link rel="stylesheet" href="../../css/common.css">
  <link rel="stylesheet" href="../../css/works_page.css">
  <!-- jsファイル -->
  <script src="../../plugins/jquery/jquery-3.7.0.min.js"></script>
  <script src="../../plugins/slick/slick.min.js"></script>
</head>
<body>

  <!-- イントロアニメーション -->
  <div id="intro">
    <h1 class="intro-text">
      作品<br>Gun Action
    </h1>
    <!-- 六角形マスク -->
    <div class="hex-mask"></div>
  </div>

  <!-- 背景 -->
  <div class="bg-wrap">
    <div class="grid" aria-hidden="true"></div>
    <canvas id="fx" aria-hidden="true"></canvas>
  </div>

  <!-- ヘッダー(サイトの一番上) -->
  <header>
    <nav class="nav">
      <div class="brand">PORTFOLIO</div>
      <div class="spacer"></div> <!-- スペース -->
      <a href="../../">メインページ</a>
    </nav>
  </header>

  <!-- スライド式サイド目次 -->
  <aside class="side-toc">
    <div class="side-toc-inner">

      <h2 class="title">目次</h2>

      <div class="contents">
        <p>
          <span class="side-toc-dot">・</span><a href="#contents-overview">作品概要</a>
        </p>
        <p>
          <span class="side-toc-dot">・</span><a href="#contents-proposal">一枚企画書</a>
        </p>
        <p>
          <span class="side-toc-dot">・</span><a href="#contents-production">制作様子</a>
        </p>
      </div>
    </div>
  </aside>
  <!-- サイド目次 | スマホ用タップ判定 -->
  <div class="side-toc-touch-area" aria-hidden="true"></div>

  <!-- サイト本体 -->
  <main class="wrap">

    <section id="contents-overview">
      <h2 class="h2 neon">作品概要</h2>
      <!-- 画像 -->
      <div class="panel">
        <!-- 画像スライダー -->
        <section id="img-slider">
          <img src="../../img/works/gun_action/card_image.png" class="kr-layout_center-img">
          <img src="../../img/works/gun_action/exhibition.png" class="kr-layout_center-img">
        </section>
      </div>
      <!-- 表 -->
      <div class="panel">
        <table class="info-table">
          <tr>
            <td>開発期間</td>
            <td>開発中 (2025/10 ~ 現在)</td>
          </tr>
          <tr>
            <td>開発人数</td>
            <td>
              2人
              <span class="person-icons">
                <span class="person-icon"></span>
                <span class="person-icon"></span>
              </span>
            </td>
          </tr>
          <tr>
            <td>ジャンル</td>
            <td>
              <span class="pillbar">
                <span class="pill">アクション</span>
                <span class="pill">TPS</span>
              </span>
            </td>
          </tr>
          <tr>
            <td>操作端末</td>
            <td>
              <span class="pillbar">
                <span class="pill">キーボード</span>
              </span>
            </td>
          </tr>
          <tr>
            <td>使用技術</td>
            <td>
              <span class="pillbar">
                <span class="pill">Unreal Engine</span>
                <span class="pill">C++</span>
              </span>
            </td>
          </tr>
        </table>
      </div>
      <!-- リンク -->
      <div class="panel">
        <b class="subtitle">リンク</b>
        <p>
          <a href="https://github.com/KurosawaReo/2GM_shinkyu_kouki02" target="_blank" class="btn-link">
            GitHub>>
          </a>
        </p>
      </div>
    </section>

    <div class="neon-line"></div> <!-- グラデーション線 -->

    <section id="contents-proposal">
      <div class="fade-in">
        <h2 class="h2 neon">一枚企画書</h2>

        <div class="panel">
          <img src="../../img/works/gun_action/proposal.png">
        </div>
      </div>
    </section>
    
    <div class="neon-line"></div> <!-- グラデーション線 -->

    <section id="contents-production">
      <div class="fade-in">
        <h2 class="h2 neon">制作様子</h2>

        <div class="panel">
          <iframe
            src="https://www.youtube.com/embed/fJSFL73J6wg"
            width="100%"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen
            class="kr-layout_center-iframe"
          ></iframe>
        </div>
      </div>
    </section>

    <p>
      <a href="../../" class="back-button">メインページへ戻る</a>
    </p>
  </main>

  <!-- フッター(サイトの一番下) -->
  <footer>
    <small>
      最終更新日: 2026/04/05<br>
      随時更新中<br>
      <br>
      ©2025-2026 Kurosawa Reo Portfolio
    </small>
  </footer>

  <!-- jsファイル -->
  <script src="../../js/common.js"></script>
  <script src="../../js/works_page.js"></script>

  <!-- マウスカーソル -->
  <div class="cursor" aria-hidden="true"><i></i></div>
</body>
</html>
